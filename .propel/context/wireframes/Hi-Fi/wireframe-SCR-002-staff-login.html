<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>SCR-002 · Staff Login</title>
<link rel="stylesheet" href="design-system.css">
</head>
<body>
<!-- Navigation Map
| Element | Action | Target Screen |
|---------|--------|---------------|
| #login-btn | click | SCR-005 (Staff Dashboard) |
-->
<main class="login-page" role="main">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon" aria-hidden="true">UP</div>
      <h1 style="font-size:var(--fs-h3);margin-top:var(--space-sm)">Unified Patient Access</h1>
      <p class="text-muted" style="margin-bottom:0">Clinical Intelligence Platform</p>
    </div>

    <div role="heading" aria-level="2" style="font-family:var(--font-heading);font-size:var(--fs-h2);font-weight:var(--fw-semibold);text-align:center;margin-bottom:var(--space-lg)">Staff Login</div>

    <form aria-label="Staff login form" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" placeholder="staff@hospital.org" autocomplete="username" required aria-required="true">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" required aria-required="true">
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-lg)">
        <label style="display:flex;align-items:center;gap:var(--space-xs);font-size:var(--fs-small);cursor:pointer">
          <input type="checkbox"> Remember me
        </label>
        <a href="#" style="font-size:var(--fs-small);color:var(--color-primary);text-decoration:none">Forgot password?</a>
      </div>
      <a href="wireframe-SCR-005-staff-dashboard.html" id="login-btn" class="btn btn-primary w-full" role="button" style="text-align:center">Sign In</a>
    </form>

    <p class="text-muted" style="text-align:center;margin-top:var(--space-lg);margin-bottom:0">
      <span class="hipaa-badge">🔒 HIPAA Compliant</span>
    </p>
  </div>
</main>
</body>
</html>
