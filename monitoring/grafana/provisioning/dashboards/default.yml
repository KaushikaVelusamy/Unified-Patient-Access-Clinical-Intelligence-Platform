apiVersion: 1

providers:
  - name: 'UPACI Dashboards'
    orgId: 1
    folder: 'Clinical Appointment Platform'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
